# Railway config for NestJS API
# Đặt file này ở root của repo, Railway sẽ đọc khi deploy service "api"

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile"

[deploy]
startCommand = "pnpm --filter=@mealmind/service-api start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
